<script>
// Collapse long code blocks to ~10 visible lines with expand/collapse toggle.
document.addEventListener("DOMContentLoaded", function () {
  var COLLAPSE_HEIGHT = 256; // px threshold (~10 lines at 0.82em)

  document.querySelectorAll("div.sourceCode").forEach(function (block) {
    // Skip short blocks that don't need collapsing
    if (block.scrollHeight <= COLLAPSE_HEIGHT) return;

    // Start collapsed
    block.classList.add("code-collapsed");

    // Create expand/collapse button
    var btn = document.createElement("button");
    btn.className = "code-expand-btn";
    btn.textContent = "Show full code";
    btn.setAttribute("aria-expanded", "false");

    btn.addEventListener("click", function () {
      var isCollapsed = block.classList.contains("code-collapsed");
      if (isCollapsed) {
        block.classList.remove("code-collapsed");
        block.classList.add("code-expanded");
        btn.textContent = "Show less";
        btn.setAttribute("aria-expanded", "true");
      } else {
        block.classList.remove("code-expanded");
        block.classList.add("code-collapsed");
        btn.textContent = "Show full code";
        btn.setAttribute("aria-expanded", "false");
      }
    });

    // Insert button right after the code block
    block.parentNode.insertBefore(btn, block.nextSibling);
  });
});
</script>
